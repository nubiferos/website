- id: base
  name: "NubiferOS"
  icon: "fas fa-shield-alt"
  description: "Core secure workstation for cloud engineers"
  features:
    - "Workspace isolation"
    - "Encrypted credentials (GPG + pass)"
    - "50+ cloud tools pre-installed"
    - "LUKS full disk encryption"
    - "Read-only mode"
    - "Security dashboard"
    - "NubiferAI available via optional package"

- id: container
  name: "NubiferOS Container"
  icon: "fas fa-box"
  type: "container"
  description: "Cloud tools in a Docker container — no install required"
  features:
    - "All NubiferOS cloud tools"
    - "Docker / Podman compatible"
    - "Lightweight and portable"
    - "CI/CD pipeline ready"
    - "No desktop environment"

- id: tpm
  name: "NubiferOS + TPM"
  icon: "fas fa-microchip"
  pattern: "-tpm-"
  description: "Everything in Base plus TPM 2.0 secure boot"
  features:
    - "Everything in Base"
    - "TPM 2.0 boot"
    - "LUKS2 + Argon2id"
    - "Secure Boot enforcement"
